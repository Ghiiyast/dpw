<HTML>
<HEAD>
  <TITLE>Download Dialog dengan Progressbar</TITLE>
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
  
  <style>
    #progressbar { margin-top: 20px; }
    .progress-label {
      font-weight: bold;
      text-shadow: 1px 1px 0 #fff;
    }
  </style>
</HEAD>
<BODY>

  <div id="dialog" title="File Download">
    <div class="progress-label">Menyiapkan unduhan...</div>
    <div id="progressbar"></div>
  </div>

  <button id="downloadButton">Mulai Download</button>

  <script>
    $(document).ready(function() {
      var progressTimer,
          progressbar = $("#progressbar"),
          progressLabel = $(".progress-label"),
          dialog = $("#dialog").dialog({
            autoOpen: false,
            closeOnEscape: false,
            resizable: false,
            buttons: {
              Batal: function() {
                closeDownload();
              }
            }
          });

      progressbar.progressbar({
        value: false,
        change: function() {
          progressLabel.text("Proses: " + progressbar.progressbar("value") + "%" );
        },
        complete: function() {
          progressLabel.text("Unduhan Selesai!");
          dialog.dialog("option", "buttons", [{
            text: "Tutup",
            click: closeDownload
          }]);
        }
      });

      function progress() {
        var val = progressbar.progressbar("value") || 0;
        progressbar.progressbar("value", val + Math.floor(Math.random() * 3));
        if (val <= 99) {
          progressTimer = setTimeout(progress, 100);
        }
      }

      function closeDownload() {
        clearTimeout(progressTimer);
        dialog.dialog("close");
        progressbar.progressbar("value", false);
        progressLabel.text("Menyiapkan unduhan...");
      }

      $("#downloadButton").on("click", function() {
        dialog.dialog("open");
        progress();
      });
    });
  </script>

</BODY>
</HTML>
