<HTML>
<HEAD>
  <TITLE>Menu Navigasi jQuery</TITLE>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      background-color: #333;
      overflow: hidden;
    }
    li {
      float: left;
    }
    li a, .dropbtn {
      display: inline-block;
      color: white;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
    }
    li a:hover, .dropdown:hover .dropbtn {
      background-color: #111;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #f9f9f9;
      min-width: 160px;
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
      z-index: 1;
    }
    .dropdown-content a {
      color: black;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      text-align: left;
    }
    .dropdown-content a:hover {
      background-color: #f1f1f1;
    }
  </style>
</HEAD>
<BODY>

<ul>
  <li><a href="#">Beranda</a></li>
  <li class="dropdown">
    <a href="javascript:void(0)" class="dropbtn">Materi Kuliah</a>
    <div class="dropdown-content">
      <a href="#">Dasar Pemrograman</a>
      <a href="#">Jaringan Komputer</a>
      <a href="#">Web Programming</a>
    </div>
  </li>
  <li><a href="#">Tentang Kami</a></li>
</ul>

<script>
  $(document).ready(function(){
    $(".dropdown").hover(
      function() {
        $(this).find(".dropdown-content").stop(true, true).slideDown(300);
      }, 
      function() {
        
        $(this).find(".dropdown-content").stop(true, true).slideUp(300);
      }
    );
  });
</script>

</BODY>
</HTML>
