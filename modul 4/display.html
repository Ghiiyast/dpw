<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Belajar Display CSS</title>
    <style>
        div {
            border: 1px solid black;
            margin: 10px auto;
            height: auto;
            width: 500px;
            background: skyblue;
            padding: 10px;
        }
       
        span {
            display: block; 
            background: red;
            color: white;
            margin-top: 10px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div>
        Ini adalah elemen pertama menggunakan DIV.
        <div>
            Ini DIV di dalam DIV. Karena DIV adalah elemen blok, dia otomatis membuat baris baru di bawah teks sebelumnya.
        </div>
        <span>
            Ini SPAN di dalam DIV. Normalnya SPAN itu menyamping, tapi karena kita beri "display: block", dia sekarang membuat kotak baru di baris baru.
        </span>
    </div>
</body>
</html>
