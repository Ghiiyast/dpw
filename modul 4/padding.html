<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan Padding</title>
    <style>
        div {
            border: 1px solid black;
            /* Memberikan jarak dalam sebesar 40px di semua sisi */
            padding: 40px; 
            background-color: lightblue;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div>
        Elemen ini memiliki padding atas, kanan, bawah, dan kiri masing-masing 40px.
        <br><br>
        <b>Padding</b> adalah ruang kosong di DALAM garis hitam ini. Perhatikan bagaimana teks tidak menempel langsung ke pinggiran kotak.
    </div>
</body>
</html>
