<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan pada link</title>
    <style type="text/css">
      
        a:link {
            text-decoration: none; 
            background-color: #FF9933; 
            color: #FFFFFF; 
            padding: 5px 10px;
        }

      
        a:visited {
            text-decoration: none;
            color: #222; 
        }

        a:hover {
            font-weight: bold;
            text-transform: uppercase; 
            text-decoration: underline overline; 
            color: #000000; 
            background-color: #CCFF00; 
        }


        a:active {
            text-decoration: none;
            color: #660000;
        }
    </style>
</head>
<body>
    <h2>Latihan Hyperlink CSS</h2>
    <table border="0">
        <tr>
            <td><a href="#">Arahkan mouse ke sini</a></td>
        </tr>
        <tr>
            <td><br><a href="#">Coba link kedua ini</a></td>
        </tr>
    </table>
</body>
</html>
