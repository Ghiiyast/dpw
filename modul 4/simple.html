<!DOCTYPE html>
<html>
    <head>
        <style>
            p { 
                text-align: center; 
                color: aqua;
                border: 2px solid blue;
                background-color: #6c9095;
                padding: 15px; 
            }

        
            #kalimat { 
                text-align: left; 
                color: red;
                border: 1px dashed rgb(255, 121, 121);
                background-color: #ffebee;
                padding: 10px; 
            }

            
            .center { 
                text-align: center;
                color: chocolate;
                border: 2px double rgb(130, 54, 0);
                background-color: #fff3e0;
                padding: 10px; 
            }

            
            p.tengah { 
                text-align: center; 
                color: darkmagenta; 
                display: block; 
                background-color: #777777;
                border: 3px solid rgb(116, 96, 96);
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <p>Penggunaan CSS sangat membantu desainer dalam menyusun halaman yang konsisten. </p> 

        <p id="kalimat">Dalam penulisan CSS sangat sederhana namun powerful dalam desain.</p> 

        <p class="center">CSS mempunyai sifat pewarisan secara default (inheritance).</p> 

        <p class="tengah">Ini adalah hasil selector dengan elemen p dengan class tengah.</p>
</html>
