<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan Margin</title>
    <style>
        div {
            border: 1px solid black;
            /* Urutan: Atas (40px), Kanan (50px), Bawah (60px), Kiri (30px) */
            margin: 40px 50px 60px 30px; 
            background-color: lightblue;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div>
        Elemen ini memiliki margin atas 40px, kanan 50px, bawah 60px, dan kiri 30px. 
        <br><br>
        <b>Margin</b> adalah ruang kosong di luar garis hitam ini yang memisahkan kotak ini dengan tepi layar atau elemen lainnya.
    </div>
</body>
</html>
